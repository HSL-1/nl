<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南江水库洪水调度工程调度平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d47a1 0%, #1565c0 50%, #1976d2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
        }
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 1.1em;
            opacity: 0.85;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #fff;
            color: #0d47a1;
            padding: 18px 48px;
            font-size: 1.3em;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        .btn:active { transform: translateY(-1px); }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 40px 0;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            transition: background 0.3s;
        }
        .feature:hover { background: rgba(255,255,255,0.18); }
        .feature-icon { font-size: 2em; margin-bottom: 8px; }
        .feature-title { font-weight: 600; margin-bottom: 4px; }
        .feature-desc { font-size: 0.85em; opacity: 0.8; }
        .footer {
            margin-top: 50px;
            font-size: 0.85em;
            opacity: 0.6;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 20px;
        }
        .status {
            display: inline-block;
            background: rgba(76, 175, 80, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-bottom: 25px;
            border: 1px solid rgba(76, 175, 80, 0.4);
        }
        .waiting { background: rgba(255, 193, 7, 0.2); border-color: rgba(255, 193, 7, 0.4); }
        .small-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.9em;
            margin: 0 10px;
        }
        .small-link:hover { color: #fff; text-decoration: underline; }
        .links { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌊</div>
        <h1>南江水库洪水调度平台</h1>
        <p class="subtitle">
            基于马斯京根法 · 新安江模型 · 泰森多边形的<br>
            交互式洪水调度工程调度系统
        </p>

        <div class="status" id="status-indicator">⏳ 正在部署中，请稍候...</div>

        <a href="https://HSL-1-nl.streamlit.app" class="btn" target="_blank" id="launch-btn">
            🚀 打开调度平台
        </a>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-title">数据总览</div>
                <div class="feature-desc">水位-库容等基础曲线</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔷</div>
                <div class="feature-title">泰森多边形</div>
                <div class="feature-desc">雨量权重分析</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🌧️</div>
                <div class="feature-title">新安江模型</div>
                <div class="feature-desc">产汇流模拟</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🌊</div>
                <div class="feature-title">马斯京根法</div>
                <div class="feature-desc">洪水演进核心</div>
            </div>
        </div>

        <div class="links">
            <a href="https://github.com/HSL-1/nl" class="small-link" target="_blank">📂 GitHub 仓库</a>
            <a href="https://HSL-1-nl.streamlit.app" class="small-link" target="_blank">🌐 Streamlit 平台</a>
        </div>

        <div class="footer">
            📐 水库洪水预报、工程调度与管理课程设计<br>
            数据已通过安全机制保护 • 公开仓库不含原始数据
        </div>
    </div>

    <script>
        // 检查平台是否可访问
        const checkUrl = 'https://HSL-1-nl.streamlit.app';
        const indicator = document.getElementById('status-indicator');
        const btn = document.getElementById('launch-btn');

        fetch(checkUrl, { mode: 'no-cors' })
            .then(() => {
                indicator.textContent = '✅ 平台已就绪，点击按钮打开';
                indicator.className = 'status';
            })
            .catch(() => {
                indicator.textContent = '⏳ 平台部署中，请稍后点击按钮访问';
                indicator.className = 'status waiting';
            });
    </script>
</body>
</html>
